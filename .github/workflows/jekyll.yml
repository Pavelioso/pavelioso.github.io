name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: false
          
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
        
      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Debug - list installed gems
        run: |
          echo "-- bundle list --"
          bundle list || true
          echo "-- bundle info jekyll-tagging --"
          bundle info jekyll-tagging || true

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Copy bundled post assets into _site
        run: |
          find _posts -mindepth 2 -maxdepth 2 \( -name '*.markdown' -o -name '*.md' \) | while read -r post_file; do
            post_dir="$(dirname "$post_file")"
            post_name="$(basename "$post_file")"
            post_stem="${post_name%.*}"
            year="${post_stem:0:4}"
            month="${post_stem:5:2}"
            day="${post_stem:8:2}"
            slug="${post_stem:11}"
            dest_dir="_site/$year/$month/$day/$slug"

            mkdir -p "$dest_dir"

            find "$post_dir" -mindepth 1 -maxdepth 1 -type f ! \( -name '*.markdown' -o -name '*.md' \) -exec cp {} "$dest_dir/" \;
          done
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
